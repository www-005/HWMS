<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Homework Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#4facfe,#00f2fe);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:500px;

height:500px;

background:rgba(255,255,255,.15);

border-radius:50%;

top:-150px;

left:-150px;

}

body::after{

content:"";

position:absolute;

width:400px;

height:400px;

background:rgba(255,255,255,.1);

border-radius:50%;

bottom:-120px;

right:-120px;

}

.card{

width:430px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

border-radius:20px;

padding:35px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

color:white;

z-index:10;

}

.logo{

width:90px;

height:90px;

border-radius:50%;

background:white;

color:#2196F3;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

font-weight:bold;

margin:auto;

margin-bottom:15px;

}

h2{

text-align:center;

margin-bottom:5px;

}

p{

text-align:center;

font-size:14px;

margin-bottom:25px;

opacity:.9;

}

.input{

position:relative;

margin-bottom:18px;

}

.input input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

font-size:15px;

outline:none;

}

.eye{

position:absolute;

right:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:18px;

color:#444;

}

button{

width:100%;

padding:13px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:.3s;

margin-top:10px;

}

.signup{

background:#00E676;

color:white;

}

.signup:hover{

transform:translateY(-2px);

}

.login{

background:white;

color:#2196F3;

}

.login:hover{

transform:translateY(-2px);

}

.toast{

position:fixed;

top:20px;

right:20px;

background:#333;

color:white;

padding:15px;

border-radius:10px;

display:none;

z-index:999;

}

.loader{

display:none;

margin:auto;

margin-top:15px;

width:40px;

height:40px;

border:4px solid white;

border-top:4px solid transparent;

border-radius:50%;

animation:spin .8s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.footer{

margin-top:20px;

text-align:center;

font-size:12px;

opacity:.8;

}

@media(max-width:500px){

.card{

width:95%;

}

}

</style>

</head>

<body>

<div class="toast" id="toast"></div>

<div class="card">

<div class="logo">

HW

</div>

<h2>Homework Management</h2>

<p>Kyçu ose krijo llogari</p>

<div class="input">

<input type="email" id="email" placeholder="Email">

</div>

<div class="input">

<input type="password" id="password" placeholder="Fjalëkalimi">

<span class="eye" id="togglePassword">👁</span>

</div>

<button class="signup" id="signupBtn">

Krijo Llogari

</button>

<button class="login" id="loginBtn">

Kyçu

</button>

<div class="loader" id="loader"></div>

<div class="footer">

Homework Management System © 2026

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

import {

getDatabase,

ref,

set

}

from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyDzLA2BtSeRukeyHaE5Sb-VGK1aSywrBv4",

authDomain:"hwms-c37e9.firebaseapp.com",

projectId:"hwms-c37e9",

storageBucket:"hwms-c37e9.firebasestorage.app",

messagingSenderId:"723888101927",

appId:"1:723888101927:web:ab140d13119fde4f7acc02",

measurementId:"G-16ZKY1MHC3"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getDatabase(app,"https://hwms-c37e9-default-rtdb.europe-west1.firebasedatabase.app");

const email=document.getElementById("email");

const password=document.getElementById("password");

const loader=document.getElementById("loader");

const toast=document.getElementById("toast");

function showToast(msg,color="#333"){

toast.innerHTML=msg;

toast.style.background=color;

toast.style.display="block";

setTimeout(()=>{

toast.style.display="none";

},3000);

}

togglePassword.onclick=()=>{

password.type=password.type==="password"?"text":"password";

};

function validate(){

if(email.value.trim()===""){

showToast("Shkruaj emailin.","red");

return false;

}

if(password.value.length<6){

showToast("Fjalëkalimi duhet të ketë të paktën 6 karaktere.","red");

return false;

}

return true;

}

signupBtn.onclick=()=>{

if(!validate())return;

loader.style.display="block";

createUserWithEmailAndPassword(auth,email.value,password.value)

.then((cred)=>{

set(ref(db,"users/"+cred.user.uid),{

email:cred.user.email,

created:new Date().toISOString()

});

showToast("Llogaria u krijua me sukses!","green");

setTimeout(()=>{

location.href="home.html";

},1200);

})

.catch(e=>{

showToast(e.message,"red");

})

.finally(()=>{

loader.style.display="none";

});

};

loginBtn.onclick=()=>{

if(!validate())return;

loader.style.display="block";

signInWithEmailAndPassword(auth,email.value,password.value)

.then(()=>{

showToast("Mirë se u ktheve!","green");

setTimeout(()=>{

location.href="home.html";

},1200);

})

.catch(e=>{

showToast(e.message,"red");

})

.finally(()=>{

loader.style.display="none";

});

};

document.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

loginBtn.click();

}

});

</script>

</body>
</html>
